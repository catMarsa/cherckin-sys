# Render.com 一键部署配置
# 本应用直接位于仓库根目录（server.js / public/ 在根），无需 rootDir。
# 在 Render 选择 New → Blueprint 导入本文件即可，自动使用正确的构建/启动命令。
services:
  - type: web
    name: checkin-system
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: APP_SECRET
        generateValue: true   # 用于 Token 签名，留空则每次部署随机生成

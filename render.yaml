# Render.com 一键部署配置
# 提交到 GitHub 后，在 Render 选择 "New" → "Blueprint" 导入本文件即可，
# 自动使用下面正确的构建/启动命令，避免 "Exited with status 127"。
services:
  - type: web
    name: checkin-system
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PASSWORD
        sync: false   # 部署后在 Render 控制台手动填写管理密码

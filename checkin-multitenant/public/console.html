<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统控制台（开发者）</title>
<style>
  :root { --theme: #4F46E5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f4f5f7; color: #1f2937; padding: 16px; }
  .wrap { max-width: 820px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 18px rgba(0,0,0,.06); padding: 22px; margin-bottom: 16px; }
  h2 { font-size: 18px; margin-bottom: 14px; color: var(--theme); }
  label { display: block; font-size: 13px; color: #6b7280; margin: 10px 0 5px; }
  input { width: 100%; padding: 11px 13px; border: 1px solid #e5e7eb; border-radius: 9px; font-size: 14px; outline: none; }
  input:focus { border-color: var(--theme); }
  button { padding: 11px 18px; border: none; border-radius: 9px; background: var(--theme); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px 8px 0 0; }
  button.ghost { background: #f3f4f6; color: #374151; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 160px; }
  .msg { font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-top: 10px; display: none; }
  .msg.ok { background: #ecfdf5; color: #047857; display: block; }
  .msg.err { background: #fef2f2; color: #b91c1c; display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th, td { border: 1px solid #eef0f3; padding: 8px; text-align: left; }
  th { background: #f9fafb; }
  .hidden { display: none !important; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; background: #ede9fe; color: #5b21b6; }
  .tabs button { background: #f3f4f6; color: #374151; }
  .tabs button.active { background: var(--theme); color: #fff; }
  .toggle { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9fafb; border-radius: 9px; margin-top: 10px; }
  .toggle input { width: auto; }
  .toggle .desc { font-size: 12px; color: #6b7280; }
  .q-row { border: 1px solid #eef0f3; border-radius: 10px; padding: 12px; margin-top: 10px; background: #fcfcfd; }
  .q-row .q-head { display: flex; gap: 8px; align-items: center; }
  .q-row .q-head select { width: 120px; flex: none; }
  .q-row .del { margin-left: auto; }
  .opt-input { font-size: 12px; color: #6b7280; }
</style>
</head>
<body>
<div class="wrap">
  <!-- 登录 / 初始化 -->
  <div id="authCard" class="card">
    <h2 id="authTitle">开发者控制台</h2>
    <div id="setupBox">
      <p style="font-size:13px;color:#6b7280;margin-bottom:8px;">首次使用，请创建超级管理员（开发者）账号：</p>
      <label>管理员用户名</label>
      <input id="suUser" placeholder="如 admin">
      <label>密码（至少4位）</label>
      <input id="suPass" type="password" placeholder="设置密码">
      <button onclick="setup()">创建超级管理员</button>
    </div>
    <div id="loginBox" class="hidden">
      <label>管理员用户名</label>
      <input id="username" placeholder="用户名">
      <label>密码</label>
      <input id="password" type="password" placeholder="密码">
      <button onclick="login()">登录</button>
    </div>
    <div id="authMsg" class="msg"></div>
  </div>

  <!-- 主控制台 -->
  <div id="console" class="card hidden">
    <div class="tabs">
      <button class="active" onclick="switchTab('admins', this)">管理员</button>
      <button onclick="switchTab('themes', this)">主题管理</button>
      <button onclick="switchTab('alldata', this)">全部数据（总后台）</button>
      <button class="ghost" onclick="logout()">退出</button>
    </div>

    <!-- 管理员 -->
    <div id="tab-admins">
      <h2 style="margin-top:18px;">管理员列表</h2>
      <div id="adminList"></div>
      <h2 style="margin-top:18px;">新增管理员</h2>
      <div class="row">
        <div><label>用户名</label><input id="naUser" placeholder="新管理员用户名"></div>
        <div><label>密码</label><input id="naPass" type="password" placeholder="至少4位"></div>
      </div>
      <button onclick="createAdmin()">创建管理员</button>
      <h2 style="margin-top:18px;">修改密码</h2>
      <div class="row">
        <div><label>目标用户名（留空改自己）</label><input id="cpUser" placeholder="默认当前账号"></div>
        <div><label>新密码</label><input id="cpPass" type="password" placeholder="至少4位"></div>
      </div>
      <button onclick="changePwd()">更新密码</button>
    </div>

    <!-- 主题 -->
    <div id="tab-themes" class="hidden">
      <h2 style="margin-top:18px;">创建主题</h2>
      <div class="row">
        <div><label>主题编码（唯一，不可重复）</label><input id="tCode" placeholder="如 会议2026"></div>
        <div><label>主题名称</label><input id="tName" placeholder="如 2026年度会议"></div>
        <div><label>主题色（可选）</label><input id="tColor" value="#4F46E5" type="color"></div>
      </div>
      <button onclick="createTheme()">创建主题</button>
      <p style="font-size:12px;color:#6b7280;margin-top:8px;">创建后，参与者访问 <code>?code=主题编码</code> 即可进入对应签到页。</p>
      <h2 style="margin-top:18px;">主题列表</h2>
      <div id="themeList"></div>

      <!-- 主题报名配置 -->
      <div id="themeConfig" class="hidden" style="margin-top:18px;border-top:1px dashed #e5e7eb;padding-top:16px;">
        <h2>编辑主题报名设置：<span id="cfgCode"></span></h2>
        <div class="toggle">
          <input type="checkbox" id="cfgValidateRoster">
          <div><div style="font-size:14px;font-weight:600;">启用报名名单校验</div><div class="desc">仅名单内人员可签到；非名单人员按下方开关处理</div></div>
        </div>
        <div class="toggle">
          <input type="checkbox" id="cfgAllowWalkin">
          <div><div style="font-size:14px;font-weight:600;">允许非名单人员自主报名</div><div class="desc">关闭后为严格模式：不在名单无法报名/签到</div></div>
        </div>
        <h2 style="margin-top:16px;">报名题目</h2>
        <p style="font-size:12px;color:#6b7280;">参与者报名/签到时需作答，支持填空与选择题。</p>
        <div id="cfgQuestions"></div>
        <button class="sm" onclick="cfgAddQuestion()">+ 添加题目</button>
        <button onclick="cfgSave()">💾 保存该主题设置</button>
        <button class="ghost" onclick="cfgClose()">关闭</button>
        <div id="cfgMsg" class="msg"></div>
      </div>
    </div>

    <!-- 全部数据 -->
    <div id="tab-alldata" class="hidden">
      <h2 style="margin-top:18px;">全部主题数据（开发者总后台）</h2>
      <button onclick="loadAll()">加载全部数据</button>
      <button class="ghost" onclick="exportAll()">导出全部 CSV</button>
      <div id="allBox"></div>
    </div>

    <div id="consoleMsg" class="msg"></div>
  </div>
</div>

<script>
let TOKEN = '';
function amsg(text, type) { const m = document.getElementById('consoleMsg'); m.textContent = text; m.className = 'msg ' + (type || ''); }

(async function init() {
  try {
    const r = await fetch('/api/console/init');
    const d = await r.json();
    if (d.initialized) {
      document.getElementById('setupBox').classList.add('hidden');
      document.getElementById('loginBox').classList.remove('hidden');
      document.getElementById('authTitle').textContent = '开发者控制台登录';
    }
  } catch (e) {}
})();

async function setup() {
  const username = document.getElementById('suUser').value.trim();
  const password = document.getElementById('suPass').value;
  if (!username || password.length < 4) { amsg('请填写用户名和密码（至少4位）', 'err'); return; }
  const r = await fetch('/api/console/setup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
  const d = await r.json();
  if (!d.success) { amsg(d.message, 'err'); return; }
  TOKEN = d.token; enterConsole();
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { amsg('请填写用户名和密码', 'err'); return; }
  const r = await fetch('/api/console/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
  const d = await r.json();
  if (!d.success) { amsg(d.message, 'err'); return; }
  TOKEN = d.token; enterConsole();
}

function enterConsole() {
  document.getElementById('authCard').classList.add('hidden');
  document.getElementById('console').classList.remove('hidden');
  loadAdmins();
}

function logout() {
  TOKEN = '';
  location.reload();
}

function switchTab(name, btn) {
  ['admins','themes','alldata'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'admins') loadAdmins();
  if (name === 'themes') loadThemes();
}

async function loadAdmins() {
  const r = await fetch('/api/console/admins', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN }) });
  const d = await r.json();
  if (!d.success) return amsg(d.message, 'err');
  let html = '<table><tr><th>用户名</th><th>角色</th></tr>';
  d.admins.forEach(a => html += `<tr><td>${a.username}</td><td>${a.isSuper?'<span class="tag">超级管理员</span>':'普通管理员'}</td></tr>`);
  html += '</table>';
  document.getElementById('adminList').innerHTML = html;
}

async function createAdmin() {
  const username = document.getElementById('naUser').value.trim();
  const password = document.getElementById('naPass').value;
  if (!username || password.length < 4) return amsg('请填写用户名和密码（至少4位）', 'err');
  const r = await fetch('/api/console/admin/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN, username, password }) });
  const d = await r.json();
  amsg(d.message, d.success?'ok':'err');
  if (d.success) { document.getElementById('naUser').value=''; document.getElementById('naPass').value=''; loadAdmins(); }
}

async function changePwd() {
  const username = document.getElementById('cpUser').value.trim();
  const newPassword = document.getElementById('cpPass').value;
  if (newPassword.length < 4) return amsg('新密码至少4位', 'err');
  const r = await fetch('/api/console/admin/password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN, username, newPassword }) });
  const d = await r.json();
  amsg(d.message, d.success?'ok':'err');
  if (d.success) document.getElementById('cpPass').value='';
}

async function createTheme() {
  const code = document.getElementById('tCode').value.trim();
  const name = document.getElementById('tName').value.trim();
  const color = document.getElementById('tColor').value;
  if (!code || !name) return amsg('请填写主题编码和名称', 'err');
  const r = await fetch('/api/console/theme/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN, code, name, color }) });
  const d = await r.json();
  amsg(d.message, d.success?'ok':'err');
  if (d.success) { document.getElementById('tCode').value=''; document.getElementById('tName').value=''; loadThemes(); }
}

async function loadThemes() {
  const r = await fetch('/api/console/themes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN }) });
  const d = await r.json();
  if (!d.success) return amsg(d.message, 'err');
  ALL_THEMES = d.themes;
  let html = '<table><tr><th>编码</th><th>名称</th><th>颜色</th><th>创建者</th><th>报名</th><th>签到</th><th>操作</th></tr>';
  d.themes.forEach(t => {
    html += `<tr><td>${t.code}</td><td>${t.name}</td><td><span style="display:inline-block;width:14px;height:14px;background:${t.color};border-radius:3px;vertical-align:middle;"></span></td><td>${t.owner}</td><td>${t.attendees}</td><td>${t.checkins}</td><td><button class="sm" onclick="cfgOpen('${t.code}')">配置</button></td></tr>`;
  });
  html += '</table>';
  if (!d.themes.length) html = '<p style="color:#6b7280;">暂无主题，请在上方创建。</p>';
  document.getElementById('themeList').innerHTML = html;
}

// ---------- 主题报名配置 ----------
let ALL_THEMES = [];
let CFG_CODE = '';
let CFG_QUESTIONS = [];

function cfgOpen(code) {
  const t = ALL_THEMES.find(x => x.code === code);
  if (!t) return;
  CFG_CODE = code;
  document.getElementById('cfgCode').textContent = code;
  const s = t.settings || {};
  document.getElementById('cfgValidateRoster').checked = !!s.validateRoster;
  document.getElementById('cfgAllowWalkin').checked = !(s.allowWalkin === false);
  CFG_QUESTIONS = (t.questions || []).map(q => ({ ...q }));
  document.getElementById('cfgQuestions').innerHTML = '';
  CFG_QUESTIONS.forEach(q => cfgAddQuestion(q));
  document.getElementById('themeConfig').classList.remove('hidden');
}

function cfgClose() {
  document.getElementById('themeConfig').classList.add('hidden');
  document.getElementById('cfgMsg').className = 'msg';
}

function cfgAddQuestion(q) {
  q = q || { type: 'text', label: '', required: false, options: [] };
  const list = document.getElementById('cfgQuestions');
  const idx = CFG_QUESTIONS.length;
  CFG_QUESTIONS.push(q);
  const div = document.createElement('div');
  div.className = 'q-row';
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="q-head">
      <select onchange="cfgOnType(this)">
        <option value="text" ${q.type==='text'?'selected':''}>填空</option>
        <option value="choice" ${q.type==='choice'?'selected':''}>选择题</option>
      </select>
      <input class="q-label" placeholder="题目内容，如 所在部门" value="${q.label||''}">
      <label style="margin:0;display:flex;align-items:center;gap:4px;font-size:13px;color:#374151;">
        <input type="checkbox" class="q-req" ${q.required?'checked':''} style="width:auto;"> 必填
      </label>
      <button class="sm danger del" onclick="cfgRemove(this)">删除</button>
    </div>
    <div class="q-opt-wrap" style="margin-top:8px;${q.type==='choice'?'':'display:none;'}">
      <label class="opt-input">选项（每行一个，或用英文逗号分隔）</label>
      <textarea class="q-opt" style="min-height:60px;font-size:13px;">${Array.isArray(q.options)?q.options.join('\n'):''}</textarea>
    </div>`;
  list.appendChild(div);
}

function cfgOnType(sel) {
  const row = sel.closest('.q-row');
  row.querySelector('.q-opt-wrap').style.display = sel.value === 'choice' ? '' : 'none';
}

function cfgRemove(btn) {
  const row = btn.closest('.q-row');
  const idx = Number(row.dataset.idx);
  CFG_QUESTIONS.splice(idx, 1);
  row.remove();
  document.querySelectorAll('#cfgQuestions .q-row').forEach((el, i) => { el.dataset.idx = i; });
}

function cfgCollect() {
  const rows = document.querySelectorAll('#cfgQuestions .q-row');
  const arr = [];
  rows.forEach((row, i) => {
    const type = row.querySelector('select').value;
    const label = row.querySelector('.q-label').value.trim();
    if (!label) return;
    const required = row.querySelector('.q-req').checked;
    let options = [];
    if (type === 'choice') options = row.querySelector('.q-opt').value.split(/\n|,|，/).map(s => s.trim()).filter(Boolean);
    arr.push({ id: (CFG_QUESTIONS[i] && CFG_QUESTIONS[i].id) || '', type, label, required, options });
  });
  return arr;
}

async function cfgSave() {
  const questions = cfgCollect();
  const settings = {
    validateRoster: document.getElementById('cfgValidateRoster').checked,
    allowWalkin: document.getElementById('cfgAllowWalkin').checked
  };
  const r = await fetch('/api/console/theme/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN, code: CFG_CODE, questions, settings }) });
  const d = await r.json();
  const m = document.getElementById('cfgMsg');
  if (d.success) { m.textContent = '✅ ' + d.message; m.className = 'msg ok'; CFG_QUESTIONS = d.theme.questions || []; loadThemes(); }
  else { m.textContent = d.message; m.className = 'msg err'; }
}

async function loadAll() {
  const r = await fetch('/api/console/data/all', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN }) });
  const d = await r.json();
  if (!d.success) return amsg(d.message, 'err');
  let html = '';
  d.themes.forEach(t => {
    const questions = t.questions || [];
    html += `<h3 style="margin:14px 0 6px;color:var(--theme);">${t.name}（${t.code}）</h3>`;
    html += `<p style="font-size:12px;color:#6b7280;">报名 ${t.attendees.length} 人，签到 ${t.checkins.length} 人</p>`;
    let head = '<tr><th>姓名</th><th>电话</th><th>单位</th><th>来源</th><th>状态</th>';
    questions.forEach(q => head += `<th>${q.label}</th>`);
    head += '</tr>';
    html += '<table>' + head + '</tr>';
    const all = [];
    t.attendees.forEach(a => { const ck = t.checkins.find(c=>c.phone===a.phone); all.push({ n:a.name,p:a.phone,u:a.unit,src:'名单',st:ck?'已签到':'未签到',ans:ck?ck.answers:null }); });
    t.signups.forEach(s => all.push({ n:s.name,p:s.phone,u:s.unit,src:'新报名',st:s.checkinTime?'已签到':'未签到',ans:s.answers }));
    all.forEach(x => {
      let row = `<tr><td>${x.n}</td><td>${x.p}</td><td>${x.u}</td><td>${x.src}</td><td>${x.st}</td>`;
      questions.forEach(q => row += `<td>${x.ans && x.ans[q.id] ? x.ans[q.id] : '—'}</td>`);
      row += '</tr>';
      html += row;
    });
    html += '</table>';
  });
  if (!d.themes.length) html = '<p style="color:#6b7280;">暂无主题数据。</p>';
  document.getElementById('allBox').innerHTML = html;
}

async function exportAll() {
  const r = await fetch('/api/console/data/all', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: TOKEN }) });
  const d = await r.json();
  if (!d.success) return amsg(d.message, 'err');
  // 汇总所有主题的题目（去重，按出现顺序）
  const qOrder = [];
  d.themes.forEach(t => (t.questions || []).forEach(q => { if (!qOrder.find(x => x.id === q.id)) qOrder.push(q); }));
  const rows = [['主题','姓名','电话','单位','来源','状态', ...qOrder.map(q => q.label)]];
  d.themes.forEach(t => {
    const all = [];
    t.attendees.forEach(a => { const ck = t.checkins.find(c=>c.phone===a.phone); all.push({ n:a.name,p:a.phone,u:a.unit,src:'名单',st:ck?'已签到':'未签到',ans:ck?ck.answers:null }); });
    t.signups.forEach(s => all.push({ n:s.name,p:s.phone,u:s.unit,src:'新报名',st:s.checkinTime?'已签到':'未签到',ans:s.answers }));
    all.forEach(x => {
      const ans = qOrder.map(q => (x.ans && x.ans[q.id]) || '');
      rows.push([t.name, x.n, x.p, x.u, x.src, x.st, ...ans]);
    });
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>'"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '全部签到数据.csv';
  a.click();
  amsg('已导出全部数据', 'ok');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动签到</title>
<style>
  :root { --theme: #4F46E5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f4f5f7; color: #1f2937; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: #fff; width: 100%; max-width: 440px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,.08); overflow: hidden; }
  .head { background: var(--theme); color: #fff; padding: 28px 24px; text-align: center; }
  .head h1 { font-size: 22px; font-weight: 700; }
  .head p { opacity: .9; margin-top: 6px; font-size: 13px; }
  .body { padding: 24px; }
  label { display: block; font-size: 13px; color: #6b7280; margin: 14px 0 6px; }
  label .req { color: #ef4444; margin-left: 2px; }
  input[type=text], input[type=tel], textarea, select { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; transition: border .2s; background: #fff; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: var(--theme); }
  textarea { resize: vertical; min-height: 70px; }
  .q-block { background: #f9fafb; border: 1px solid #eef0f3; border-radius: 12px; padding: 14px 16px; margin-top: 14px; }
  .q-title { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 10px; }
  .opt { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 9px; margin-bottom: 8px; cursor: pointer; transition: all .15s; background: #fff; }
  .opt:hover { border-color: var(--theme); }
  .opt input { width: auto; }
  button { width: 100%; padding: 13px; border: none; border-radius: 10px; background: var(--theme); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: opacity .2s; }
  button:active { opacity: .85; }
  button:disabled { opacity: .6; cursor: not-allowed; }
  button.ghost { background: #f3f4f6; color: #374151; }
  .msg { margin-top: 14px; font-size: 13px; padding: 10px 12px; border-radius: 8px; display: none; }
  .msg.ok { background: #ecfdf5; color: #047857; display: block; }
  .msg.err { background: #fef2f2; color: #b91c1c; display: block; }
  .admin-link { text-align: center; margin-top: 18px; font-size: 12px; }
  .admin-link a { color: var(--theme); text-decoration: none; }
  .status { text-align: center; font-size: 14px; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
  .status.checked { background: #ecfdf5; color: #047857; }
  .status.attendee { background: #eff6ff; color: #1d4ed8; }
  .status.new { background: #fefce8; color: #a16207; }
  .from-roster { font-size: 12px; color: #16a34a; margin-top: 4px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <h1 id="title">活动签到</h1>
      <p id="subtitle">请输入信息完成签到</p>
    </div>
    <div class="body">
      <div id="codeBox">
        <label>主题编码</label>
        <input id="codeInput" type="text" placeholder="请输入活动主题编码，如 会议2026">
        <button onclick="loadTheme()">进入签到</button>
      </div>

      <div id="mainBox" class="hidden">
        <div id="statusArea"></div>
        <label>手机号</label>
        <input id="phone" type="tel" placeholder="请输入手机号" inputmode="numeric" maxlength="11">
        <button onclick="lookup()">查询 / 签到</button>

        <div id="detailBox" class="hidden">
          <label>姓名</label>
          <input id="name" type="text" placeholder="请输入姓名">
          <label>单位</label>
          <input id="unit" type="text" placeholder="请输入单位名称">
          <div id="questionsBox"></div>
          <button id="submitBtn" onclick="submit()">确认</button>
        </div>

        <div id="msg" class="msg"></div>

        <div class="admin-link">
          <a id="adminLink" href="#">管理后台入口</a>
        </div>
      </div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
let CODE = params.get('code') || '';
let THEME = null;            // 当前主题配置（含 questions / 名单校验开关）
let currentStatus = null;    // checked / attendee / new
let submitMode = 'signup';   // checkin / signup
let rosterUser = null;       // 名单中带出的信息

if (CODE) {
  document.getElementById('codeInput').value = CODE;
  loadTheme();
}

function setMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + (type || '');
}

function applyTheme(color) {
  if (color) document.documentElement.style.setProperty('--theme', color);
}

// 渲染报名题目（填空 / 选择）
function renderQuestions(container, questions, values) {
  container.innerHTML = '';
  if (!questions || !questions.length) return;
  questions.forEach(q => {
    const block = document.createElement('div');
    block.className = 'q-block';
    const title = document.createElement('div');
    title.className = 'q-title';
    title.textContent = q.label + (q.required ? ' *' : '');
    block.appendChild(title);

    if (q.type === 'choice' && q.options && q.options.length) {
      q.options.forEach(opt => {
        const lbl = document.createElement('label');
        lbl.className = 'opt';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'q_' + q.id;
        radio.value = opt;
        radio.dataset.qid = q.id;
        if (values && values[q.id] === opt) radio.checked = true;
        lbl.appendChild(radio);
        lbl.appendChild(document.createTextNode(' ' + opt));
        block.appendChild(lbl);
      });
    } else {
      const input = document.createElement('input');
      input.type = 'text';
      input.dataset.qid = q.id;
      input.placeholder = '请输入' + (q.label || '');
      if (values && values[q.id]) input.value = values[q.id];
      block.appendChild(input);
    }
    container.appendChild(block);
  });
}

// 收集题目答案
function collectAnswers(questions) {
  const out = {};
  if (!questions) return out;
  questions.forEach(q => {
    if (q.type === 'choice') {
      const el = document.querySelector(`input[name="q_${q.id}"]:checked`);
      if (el) out[q.id] = el.value;
    } else {
      const el = document.querySelector(`input[data-qid="${q.id}"]`);
      if (el && el.value.trim()) out[q.id] = el.value.trim();
    }
  });
  return out;
}

async function loadTheme() {
  CODE = document.getElementById('codeInput').value.trim();
  if (!CODE) { setMsg('请输入主题编码', 'err'); return; }
  history.replaceState(null, '', '?code=' + encodeURIComponent(CODE));
  try {
    const r = await fetch('/api/theme?code=' + encodeURIComponent(CODE));
    const d = await r.json();
    if (!d.success) { setMsg(d.message, 'err'); return; }
    THEME = d.theme;
    document.getElementById('title').textContent = THEME.name;
    applyTheme(THEME.color);
    document.getElementById('adminLink').href = 'admin.html?code=' + encodeURIComponent(CODE);
    document.getElementById('codeBox').classList.add('hidden');
    document.getElementById('mainBox').classList.remove('hidden');
    document.getElementById('statusArea').innerHTML = '';
    document.getElementById('detailBox').classList.add('hidden');
    document.getElementById('phone').value = '';
    setMsg('');
  } catch (e) {
    setMsg('网络错误', 'err');
  }
}

async function lookup() {
  const phone = document.getElementById('phone').value.trim();
  if (!/^1\d{10}$/.test(phone)) { setMsg('请输入正确的手机号', 'err'); return; }
  try {
    const r = await fetch('/api/lookup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ code: CODE, phone }) });
    const d = await r.json();
    currentStatus = d.status;
    const sa = document.getElementById('statusArea');
    const db = document.getElementById('detailBox');
    const qb = document.getElementById('questionsBox');

    if (d.status === 'checked') {
      sa.className = 'status checked';
      sa.textContent = '✅ 您已于 ' + (d.user.checkinTime ? new Date(d.user.checkinTime).toLocaleString() : '') + ' 签到';
      db.classList.add('hidden');
      setMsg('');
    } else if (d.status === 'attendee') {
      rosterUser = d.user;
      sa.className = 'status attendee';
      sa.innerHTML = '👋 ' + (d.user.name || '') + '，您在报名名单中，请补全信息签到<div class="from-roster">已自动带出名单信息</div>';
      document.getElementById('name').value = d.user.name || '';
      document.getElementById('unit').value = d.user.unit || '--';
      renderQuestions(qb, THEME.questions);
      submitMode = 'checkin';
      db.classList.remove('hidden');
      setMsg('');
    } else {
      // 新参与者：检查名单校验策略
      const strictNoWalkin = THEME.validateRoster && !THEME.allowWalkin;
      if (strictNoWalkin) {
        sa.className = 'status new';
        sa.textContent = '🚫 您不在本次活动的报名名单中，无法报名或签到';
        db.classList.add('hidden');
        setMsg('', '');
        return;
      }
      rosterUser = null;
      sa.className = 'status new';
      sa.textContent = THEME.validateRoster ? '🆕 名单外人员报名（将标记为自主报名）' : '🆕 新参与者，请填写信息报名并签到';
      document.getElementById('name').value = '';
      document.getElementById('unit').value = '';
      renderQuestions(qb, THEME.questions);
      submitMode = 'signup';
      db.classList.remove('hidden');
      setMsg('');
    }
  } catch (e) {
    setMsg('网络错误', 'err');
  }
}

async function submit() {
  const phone = document.getElementById('phone').value.trim();
  const name = document.getElementById('name').value.trim();
  const unit = document.getElementById('unit').value.trim();
  if (!name) { setMsg('请输入姓名', 'err'); return; }
  if (!unit) { setMsg('请输入单位', 'err'); return; }

  // 必填题目校验
  if (THEME.questions && THEME.questions.length) {
    for (const q of THEME.questions) {
      if (q.required) {
        const v = q.type === 'choice'
          ? (document.querySelector(`input[name="q_${q.id}"]:checked`) || {}).value
          : (document.querySelector(`input[data-qid="${q.id}"]`) || {}).value;
        if (!v || !v.trim()) { setMsg('请填写必填题目：' + q.label, 'err'); return; }
      }
    }
  }

  const answers = collectAnswers(THEME.questions);
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  const payload = { code: CODE, name, phone, unit, answers };
  try {
    const r = await fetch(submitMode === 'checkin' ? '/api/checkin' : '/api/signup', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.success) {
      setMsg('🎉 提交成功！', 'ok');
      const sa = document.getElementById('statusArea');
      sa.className = 'status checked';
      sa.textContent = '✅ ' + (submitMode === 'checkin' ? '签到成功' : '报名并签到成功');
      document.getElementById('detailBox').classList.add('hidden');
    } else {
      setMsg(d.message, 'err');
      btn.disabled = false;
      btn.textContent = submitMode === 'checkin' ? '确认签到' : '确认报名并签到';
    }
  } catch (e) {
    setMsg('网络错误', 'err');
    btn.disabled = false;
    btn.textContent = submitMode === 'checkin' ? '确认签到' : '确认报名并签到';
  }
}

// 动态按钮文案
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('submitBtn');
  const obs = new MutationObserver(() => {
    if (document.getElementById('detailBox').classList.contains('hidden')) return;
    btn.textContent = submitMode === 'checkin' ? '确认签到' : '确认报名并签到';
  });
  obs.observe(document.getElementById('detailBox'), { attributes: true, attributeFilter: ['class'] });
});
</script>
</body>
</html>
